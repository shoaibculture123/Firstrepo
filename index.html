<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CamScanner to 17KB Resizer</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #fdfdfd; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 350px; }
        h2 { color: #2ecc71; margin-bottom: 10px; }
        p { color: #666; font-size: 14px; }
        input[type="file"] { margin: 20px 0; font-size: 12px; }
        button { background: #2ecc71; color: white; border: none; padding: 12px 25px; border-radius: 6px; cursor: pointer; font-size: 16px; width: 100%; transition: 0.3s; }
        button:hover { background: #27ae60; }
        #status { margin-top: 15px; font-size: 13px; color: #333; font-weight: bold; }
        .preview-img { margin-top: 20px; max-width: 100%; border-radius: 5px; display: none; border: 1px solid #ddd; }
    </style>
</head>
<body>

<div class="card">
    <h2>17KB Resizer</h2>
    <p>Scanner images ko 17KB tak compress karein</p>
    
    <input type="file" id="imageInput" accept="image/*">
    <button onclick="resizeImage()">Compress & Download</button>

    <div id="status"></div>
    <img id="preview" class="preview-img">
</div>

<script>
    async function resizeImage() {
        const fileInput = document.getElementById('imageInput');
        const status = document.getElementById('status');
        const preview = document.getElementById('preview');
        
        if (fileInput.files.length === 0) {
            alert("Please select an image first!");
            return;
        }

        const file = fileInput.files[0];
        status.innerText = "Processing... Please wait.";

        const img = new Image();
        img.src = URL.createObjectURL(file);

        img.onload = async () => {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');

            let targetSize = 17 * 1024; // 17 KB in bytes
            let quality = 0.8;
            let width = 600; // CamScanner images ke liye optimal width
            let blob;
            let fileSize = Infinity;

            // Loop jab tak size 17KB se kam na ho jaye
            while (fileSize > targetSize && quality > 0.1) {
                const height = (img.height / img.width) * width;
                canvas.width = width;
                canvas.height = height;

                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0, width, height);

                // JPEG compression use kar rahe hain kyunki ye sabse efficient hai
                blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', quality));
                fileSize = blob.size;

                // Har step par width aur quality thodi kam karein
                width -= 50;
                quality -= 0.05;

                if (width < 100) break; 
            }

            // Preview aur Download logic
            const url = URL.createObjectURL(blob);
            preview.src = url;
            preview.style.display = "block";
            status.innerText = "Success! New Size: " + (blob.size / 1024).toFixed(2) + " KB";

            const downloadLink = document.createElement('a');
            downloadLink.href = url;
            downloadLink.download = "resized_17kb.jpg";
            downloadLink.click();
        };
    }
</script>

</body>
</html>
